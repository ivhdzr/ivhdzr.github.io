<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gestión de productos</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet" crossorigin="anonymous">
        <link rel="manifest" href="manifest.json">
        <link rel="icon" href="img/icons/favicon-32x32.png" type="image/x-icon">
    </head>
    <body>
        <!-- Barra superior -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Gestión de productos</a>
                <button id="addProductBtn" class="btn btn-light">Añadir
                    producto</button>
            </div>
        </nav>

        <!-- Modal para añadir/editar producto -->
        <div class="modal fade" id="productModal" tabindex="-1"
            aria-labelledby="modalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalLabel">Añadir
                            producto</h5>
                        <button type="button" class="btn-close"
                            data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="productForm">
                            <input type="hidden" id="productId">
                            <div class="mb-3">
                                <label for="title" class="form-label">Título del
                                    producto</label>
                                <input type="text" id="title"
                                    class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="description"
                                    class="form-label">Descripción</label>
                                <textarea id="description" class="form-control"
                                    required></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="category"
                                    class="form-label">Categoría</label>
                                <input type="text" id="category"
                                    class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="price"
                                    class="form-label">Precio</label>
                                <input type="number" id="price"
                                    class="form-control" step="0.01" required>
                            </div>
                            <div class="mb-3">
                                <label for="stock"
                                    class="form-label">Stock</label>
                                <input type="number" id="stock"
                                    class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label for="imageUrl" class="form-label">URL de
                                    imagen</label>
                                <input type="url" id="imageUrl"
                                    class="form-control">
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                            data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" form="productForm"
                            class="btn btn-primary">Guardar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal de Confirmación de Eliminación -->
        <div class="modal fade" id="deleteModal" tabindex="-1"
            aria-labelledby="deleteModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <!--<div class="modal-header">
                        <h5 class="modal-title" id="deleteModalLabel">Confirmar
                            Eliminación</h5>
                        <button type="button" class="btn-close"
                            data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>-->
                    <div class="modal-body">
                        ¿Quieres eliminar el producto <span
                            id="deleteProductName"></span>?
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary"
                            data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn btn-danger"
                            id="confirmDeleteBtn">Eliminar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Contenedor de Toasts -->
        <div aria-live="polite" aria-atomic="true"
            class="position-fixed top-50 start-50 translate-middle p-3" style="z-index: 1050;">
            <div id="toast-container"></div>
        </div>

        <!-- Listado de productos -->
        <div class="container mt-5 pt-5" id="productList">
            <h2 class="mb-4">Productos disponibles</h2>
            <div class="row" id="productsContainer"></div>
        </div>

        <script src="app.js"></script>
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
